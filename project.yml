name: KeepGoing
options:
  bundleIdPrefix: com.zhenqiang
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    GENERATE_INFOPLIST_FILE: YES
    PRODUCT_NAME: KeepGoing
targets:
  KeepGoing:
    type: application
    platform:
      - iOS
      - macOS
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhenqiang.KeepGoing
        INFOPLIST_KEY_CFBundleDisplayName: KeepGoing
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        SUPPORTS_MACCATALYST: NO
    scheme:
      gatherCoverageData: false
