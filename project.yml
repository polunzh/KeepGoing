name: KeepGoing
options:
  bundleIdPrefix: com.zhenqiang
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 7
    MARKETING_VERSION: 0.0.5
    GENERATE_INFOPLIST_FILE: YES
    PRODUCT_NAME: KeepGoing
targets:
  KeepGoing:
    type: application
    platform:
      - iOS
      - macOS
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhenqiang.KeepGoing
        INFOPLIST_KEY_CFBundleDisplayName: KeepGoing
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: NO
    scheme:
      gatherCoverageData: false
      testTargets:
        - KeepGoingTests
        - KeepGoingUITests

  KeepGoingTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget:
      macOS: "14.0"
    sources:
      - path: Tests/KeepGoingTests
    dependencies:
      - target: KeepGoing_macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhenqiang.KeepGoingTests
        PRODUCT_MODULE_NAME: KeepGoingTests
        GENERATE_INFOPLIST_FILE: YES

  KeepGoingUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget:
      macOS: "14.0"
    sources:
      - path: Tests/KeepGoingUITests
    dependencies:
      - target: KeepGoing_macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhenqiang.KeepGoingUITests
        PRODUCT_MODULE_NAME: KeepGoingUITests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  KeepGoingTests:
    build:
      targets:
        KeepGoing_macOS: [test]
        KeepGoingTests: [test]
    test:
      targets:
        - KeepGoingTests
